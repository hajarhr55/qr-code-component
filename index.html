<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | QR code component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .container {
        background: #d5e1ef;
        width: 100%;
        min-height: 100vh;
        box-sizing: border-box;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background-color: #ffffff;
        width: 100%;
        max-width: 320px;
        text-align: center;
        padding: 16px;
        padding-bottom: 40px;
        border-radius: 20px;
      }
      img {
        width: 100%;
        height: auto;
        border-radius: 10px;
      }
      .text {
        text-align: center;
        padding: 0 16px;
        margin-top: 24px;
      }
      .title {
        font-size: 22px;
        font-family: "Outfit", sans-serif;
        font-weight: bold;
        line-height: 120%;
        margin: 0;
        margin-bottom: 16px;
      }
      .paragraph {
        font-family: "Outfit", sans-serif;
        font-weight: 400;
        line-height: 140%;
        letter-spacing: 0.2px;
        font-size: 15px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <img src="images/image-qr-code.png" alt="" />
        <div class="text">
          <p class="title">
            Improve your front-end skills by building projects
          </p>
          <p class="paragraph">
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
